name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'msp-claude-plugins/docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: msp-claude-plugins/docs/package-lock.json

      - name: Install dependencies
        working-directory: msp-claude-plugins/docs
        run: npm ci

      - name: Build with Astro
        working-directory: msp-claude-plugins/docs
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: msp-claude-plugins/docs/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  notify-gateway:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger mcp-gateway rebuild
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ secrets.GATEWAY_DISPATCH_TOKEN }}
          repository: wyre-technology/mcp-gateway
          event-type: docs-updated
          client-payload: '{"sha": "${{ github.sha }}"}'
